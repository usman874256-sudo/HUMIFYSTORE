<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chatbot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6af7;
    --accent-glow: rgba(124,106,247,0.18);
    --accent-dim: #4a3fcf;
    --text: #e8e8f0;
    --text-muted: #6e6e88;
    --text-dim: #3a3a52;
    --user-bubble: #7c6af7;
    --bot-bubble: #1e1e28;
    --success: #34d399;
    --font-main: 'DM Sans', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 420px;
    height: 680px;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(124,106,247,0.08), 0 40px 80px rgba(0,0,0,0.5);
  }

  /* Header */
  .header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #7c6af7, #4a3fcf);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    box-shadow: 0 0 16px rgba(124,106,247,0.4);
  }

  .header-info { flex: 1; }
  .header-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.01em;
  }
  .header-status {
    font-size: 11px;
    color: var(--success);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 1px;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-actions { display: flex; gap: 6px; }
  .icon-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 2px; }

  /* Date divider */
  .date-divider {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .date-divider::before, .date-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Message row */
  .msg-row {
    display: flex;
    gap: 10px;
    animation: msgIn 0.25s ease;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    margin-top: 2px;
  }
  .msg-avatar.bot {
    background: linear-gradient(135deg, #7c6af7, #4a3fcf);
    box-shadow: 0 0 10px rgba(124,106,247,0.3);
  }
  .msg-avatar.user-av {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  .msg-body { max-width: 75%; display: flex; flex-direction: column; gap: 4px; }
  .msg-row.user .msg-body { align-items: flex-end; }

  .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.6;
    word-break: break-word;
  }
  .bubble.bot {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .bubble.user {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg-time {
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    padding: 0 2px;
  }

  /* Typing indicator */
  .typing-bubble {
    display: none;
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
    width: fit-content;
  }
  .typing-bubble.visible { display: flex; gap: 4px; align-items: center; }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s infinite ease;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* Suggestions */
  .suggestions {
    padding: 0 16px 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .suggestion-chip {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 11.5px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font-main);
    white-space: nowrap;
  }
  .suggestion-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-glow);
  }

  /* Input area */
  .input-area {
    padding: 12px 14px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px 10px 8px 14px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: rgba(124,106,247,0.4); }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 13.5px;
    line-height: 1.5;
    resize: none;
    max-height: 100px;
    min-height: 22px;
  }
  #user-input::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 0 0 12px rgba(124,106,247,0.3);
  }
  .send-btn:hover { background: #9180fa; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 15px; height: 15px; }

  .char-count {
    text-align: right;
    font-size: 10px;
    color: var(--text-dim);
    padding: 4px 2px 0;
    font-family: var(--font-mono);
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="avatar">🤖</div>
    <div class="header-info">
      <div class="header-name">Nova AI</div>
      <div class="header-status">
        <span class="status-dot"></span>
        Online &mdash; ready to help
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="clearChat()" title="Clear chat">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 4h10M5 4V2.5a.5.5 0 01.5-.5h5a.5.5 0 01.5.5V4M6 7v4M10 7v4M4 4l.5 8a1 1 0 001 1h5a1 1 0 001-1L12 4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="date-divider">Today</div>

    <div class="msg-row">
      <div class="msg-avatar bot">🤖</div>
      <div class="msg-body">
        <div class="bubble bot">Hello! I'm Nova, your AI assistant. How can I help you today? ✨</div>
        <span class="msg-time" id="init-time"></span>
      </div>
    </div>
  </div>

  <!-- Typing indicator -->
  <div style="padding: 0 16px 8px; flex-shrink:0;">
    <div class="msg-row" id="typing-row" style="display:none;">
      <div class="msg-avatar bot">🤖</div>
      <div class="msg-body">
        <div class="typing-bubble visible">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Suggestions -->
  <div class="suggestions" id="suggestions">
    <button class="suggestion-chip" onclick="sendSuggestion(this)">Tell me a fun fact 🎲</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">Write me a haiku 🌸</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">Explain quantum physics 🔬</button>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="user-input" rows="1" placeholder="Type a message…" maxlength="500"
        oninput="autoResize(this); updateChar(this)"
        onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 16 16" fill="white">
          <path d="M1.5 1.5l13 6.5-13 6.5V10l9-2-9-2V1.5z"/>
        </svg>
      </button>
    </div>
    <div class="char-count" id="char-count">0 / 500</div>
  </div>
</div>

<script>
const API_KEY = "";  // Replace with your Anthropic API key, or use proxy
const MODEL   = "claude-sonnet-4-20250514";
const SYSTEM  = "You are Nova, a friendly, helpful, and concise AI assistant. Keep responses clear and conversational. Use markdown sparingly. Max 3 short paragraphs unless the user needs detail.";

let history = [];

function getTime() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

document.getElementById('init-time').textContent = getTime();

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function updateChar(el) {
  document.getElementById('char-count').textContent = el.value.length + ' / 500';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendSuggestion(btn) {
  document.getElementById('user-input').value = btn.textContent.replace(/[🎲🌸🔬]/g,'').trim();
  document.getElementById('suggestions').style.display = 'none';
  sendMessage();
}

function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row' + (role === 'user' ? ' user' : '');

  const avEl = document.createElement('div');
  avEl.className = 'msg-avatar ' + (role === 'user' ? 'user-av' : 'bot');
  avEl.textContent = role === 'user' ? '👤' : '🤖';

  const body = document.createElement('div');
  body.className = 'msg-body';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (role === 'user' ? 'user' : 'bot');
  bubble.textContent = text;

  const time = document.createElement('span');
  time.className = 'msg-time';
  time.textContent = getTime();

  body.appendChild(bubble);
  body.appendChild(time);
  row.appendChild(avEl);
  row.appendChild(body);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping(show) {
  document.getElementById('typing-row').style.display = show ? 'flex' : 'none';
  if (show) document.getElementById('messages').scrollTop = 999999;
}

function clearChat() {
  history = [];
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '<div class="date-divider">Today</div>';
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `<div class="msg-avatar bot">🤖</div><div class="msg-body"><div class="bubble bot">Chat cleared! Start a new conversation. 🔄</div><span class="msg-time">${getTime()}</span></div>`;
  msgs.appendChild(row);
  document.getElementById('suggestions').style.display = 'flex';
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text  = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  updateChar(input);
  document.getElementById('suggestions').style.display = 'none';

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  showTyping(true);

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });

    const data = await resp.json();

    if (data.error) throw new Error(data.error.message);

    const reply = data.content[0].text;
    history.push({ role: 'assistant', content: reply });

    showTyping(false);
    addMessage('bot', reply);

  } catch (err) {
    showTyping(false);
    addMessage('bot', '⚠️ ' + (err.message || 'Something went wrong. Please try again.'));
  }
}
</script>
</body>
</html>
